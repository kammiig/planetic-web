---
# cPanel Git Version Control deployment tasks.
# Runs from the repository root when you click "Deploy HEAD Commit" in
# cPanel → Git Version Control (or `uapi VersionControlDeployment create ...`).
#
# Assumes the repository itself is the live application directory and the
# domain's document root points at its /public folder. The .env file and
# storage/ are gitignored, so deployments never touch them.
#
# /usr/local/bin/php and /opt/cpanel/composer/bin/composer are the standard
# cPanel locations — adjust if your host differs (check with `which php`).
deployment:
  tasks:
    - /usr/local/bin/php /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader --no-interaction
    - /usr/local/bin/php artisan migrate --force
    - /usr/local/bin/php artisan optimize:clear
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:cache
    - /usr/local/bin/php artisan event:cache
    # The live document root (~/public_html) is a separate copy of public/ and
    # the host does not follow symlinks for static files, so the built assets
    # must be copied there on every deploy. index.php/.htaccess in public_html
    # are deliberately NOT touched (they were adjusted to bootstrap this app).
    - /bin/bash -c '[ -d "$HOME/public_html" ] && [ ! -L "$HOME/public_html/build" ] && /usr/bin/rsync -a --delete ./public/build/ "$HOME/public_html/build/" || true'
